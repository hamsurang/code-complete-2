<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 0 1092 456" role="img" aria-labelledby="cm-title cm-desc" preserveAspectRatio="xMidYMid meet">
  <title id="cm-title">Code Complete 2판 35장 커버리지 맵</title>
  <desc id="cm-desc">세 테마에 걸쳐 35장 중 20장이 다뤄졌고 15장이 미커버임을 보여주는 nested containment 다이어그램</desc>

  <style>
    .bg-paper { fill: #ffffff; }
    .bg-paper-2 { fill: #f6f8fa; }
    .c-ink { fill: #1F2328; }
    .c-muted { fill: #57534e; }
    .c-soft { fill: #78716c; }
    .c-accent { fill: #16A34A; }
    .s-rule-solid { stroke: rgba(120,113,108,0.35); }
    .s-rule { stroke: rgba(31,35,40,0.12); }
    .s-accent { stroke: #16A34A; }
    .fill-accent-tint { fill: rgba(22,163,74,0.10); }
    .mask { fill: #ffffff; }
    text { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    .title { font-family: Georgia, 'Noto Serif KR', serif; }

    @media (prefers-color-scheme: dark) {
      .bg-paper { fill: #0D1117; }
      .bg-paper-2 { fill: #161B22; }
      .c-ink { fill: #f0f6fc; }
      .c-muted { fill: #a8a29e; }
      .c-soft { fill: #8e8680; }
      .c-accent { fill: #4ADE80; }
      .s-rule-solid { stroke: rgba(168,162,158,0.35); }
      .s-rule { stroke: rgba(240,246,252,0.18); }
      .s-accent { stroke: #4ADE80; }
      .fill-accent-tint { fill: rgba(74,222,128,0.14); }
      .mask { fill: #0D1117; }
    }
  </style>

  <rect class="bg-paper" x="-2" width="1092" height="456"/>

  <!-- Theme 1 -->
  <g transform="translate(0, 20)">
    <rect class="bg-paper-2 s-rule-solid" x="0" y="0" width="340" height="400" rx="12" stroke-width="1"/>
    <rect class="mask" x="16" y="-8" width="180" height="16"/>
    <text class="mono c-muted" x="24" y="4" font-size="9" letter-spacing="0.18em">THEME · 기초</text>
    <text class="title c-ink" x="20" y="40" font-size="20">🧭 구현의 기초</text>
    <text class="c-muted" x="20" y="64" font-size="11">구현이란 무엇인가 · 비유 · 사전 준비 · 설계</text>

    <rect class="fill-accent-tint s-accent" x="20" y="88" width="300" height="60" rx="8" stroke-width="1.2"/>
    <text class="c-ink" x="36" y="110" font-size="13" font-weight="600">1~4장 · 구현 · 비유 · 요구사항 · 결정</text>
    <text class="mono c-accent" x="36" y="130" font-size="9" letter-spacing="0.14em">WEEK 8 · COVERED</text>

    <rect class="fill-accent-tint s-accent" x="20" y="160" width="300" height="60" rx="8" stroke-width="1.2"/>
    <text class="c-ink" x="36" y="182" font-size="13" font-weight="600">5~6장 · 구현 설계 · 클래스 설계</text>
    <text class="mono c-accent" x="36" y="202" font-size="9" letter-spacing="0.14em">WEEK 6 · COVERED</text>

    <rect x="20" y="240" width="300" height="130" rx="8" fill="none" class="s-rule-solid" stroke-width="1" stroke-dasharray="4,4"/>
    <text class="c-muted" x="36" y="262" font-size="12" font-weight="600">10~19장 · 변수 · 조건문 · 제어</text>
    <text class="c-soft" x="36" y="280" font-size="11">데이터 타입 · 변수 · 기본 제어 구조 등</text>
    <text class="c-soft" x="36" y="300" font-size="11">언어 메커니즘에 해당해 프레임워크 시대</text>
    <text class="c-soft" x="36" y="318" font-size="11">FE에선 우선순위를 낮춰 선정 제외됐어요</text>
    <text class="mono c-soft" x="36" y="352" font-size="9" letter-spacing="0.14em">10 CHAPTERS · NOT COVERED</text>
  </g>

  <!-- Theme 2 -->
  <g transform="translate(372, 20)">
    <rect class="bg-paper-2 s-rule-solid" x="0" y="0" width="340" height="400" rx="12" stroke-width="1"/>
    <rect class="mask" x="16" y="-8" width="200" height="16"/>
    <text class="mono c-muted" x="24" y="4" font-size="9" letter-spacing="0.18em">THEME · 좋은 코드</text>
    <text class="title c-ink" x="20" y="40" font-size="20">✏️ 좋은 코드 쓰기</text>
    <text class="c-muted" x="20" y="64" font-size="11">루틴 · 방어적 프로그래밍 · 품질 · 테스트 · 디버깅</text>

    <rect class="fill-accent-tint s-accent" x="20" y="88" width="300" height="60" rx="8" stroke-width="1.2"/>
    <text class="c-ink" x="36" y="110" font-size="13" font-weight="600">7~9장 · 루틴 · 방어 · 의사코드(PPP)</text>
    <text class="mono c-accent" x="36" y="130" font-size="9" letter-spacing="0.14em">WEEK 7 · COVERED</text>

    <rect class="fill-accent-tint s-accent" x="20" y="160" width="300" height="60" rx="8" stroke-width="1.2"/>
    <text class="c-ink" x="36" y="182" font-size="13" font-weight="600">20~23장 · 품질 · 협력 · 테스트 · 디버깅</text>
    <text class="mono c-accent" x="36" y="202" font-size="9" letter-spacing="0.14em">WEEK 3~4 · COVERED</text>

    <rect x="20" y="240" width="300" height="130" rx="8" fill="none" class="s-rule-solid" stroke-width="1" stroke-dasharray="4,4"/>
    <text class="c-muted" x="36" y="262" font-size="12" font-weight="600">27~30장 · 시스템 고려사항</text>
    <text class="c-soft" x="36" y="280" font-size="11">프로그램 규모 · 관리 · 생산성 도구 등</text>
    <text class="c-soft" x="36" y="300" font-size="11">조직·관리 영역이 많아 개발자 관점 학습의</text>
    <text class="c-soft" x="36" y="318" font-size="11">우선순위에서 뒤로 밀렸어요</text>
    <text class="mono c-soft" x="36" y="352" font-size="9" letter-spacing="0.14em">4 CHAPTERS · NOT COVERED</text>
  </g>

  <!-- Theme 3 -->
  <g transform="translate(744, 20)">
    <rect class="bg-paper-2 s-rule-solid" x="0" y="0" width="340" height="400" rx="12" stroke-width="1"/>
    <rect class="mask" x="16" y="-8" width="200" height="16"/>
    <text class="mono c-muted" x="24" y="4" font-size="9" letter-spacing="0.18em">THEME · 완성</text>
    <text class="title c-ink" x="20" y="40" font-size="20">🔧 완성과 성장</text>
    <text class="c-muted" x="20" y="64" font-size="11">리팩터링 · 코드 튜닝 · 레이아웃 · 장인정신</text>

    <rect class="fill-accent-tint s-accent" x="20" y="88" width="300" height="60" rx="8" stroke-width="1.2"/>
    <text class="c-ink" x="36" y="110" font-size="13" font-weight="600">24~26장 · 리팩터링 · 튜닝 전략·기법</text>
    <text class="mono c-accent" x="36" y="130" font-size="9" letter-spacing="0.14em">WEEK 5 · COVERED</text>

    <rect class="fill-accent-tint s-accent" x="20" y="160" width="300" height="60" rx="8" stroke-width="1.2"/>
    <text class="c-ink" x="36" y="182" font-size="13" font-weight="600">31~34장 · 레이아웃 · 자기 설명 · 장인정신</text>
    <text class="mono c-accent" x="36" y="202" font-size="9" letter-spacing="0.14em">WEEK 2 · COVERED</text>

    <rect x="20" y="240" width="300" height="130" rx="8" fill="none" class="s-rule-solid" stroke-width="1" stroke-dasharray="4,4"/>
    <text class="c-muted" x="36" y="262" font-size="12" font-weight="600">35장 · 추가 도서와 자원</text>
    <text class="c-soft" x="36" y="280" font-size="11">McConnell이 권하는 다음 읽을 거리 모음</text>
    <text class="c-soft" x="36" y="300" font-size="11">본문 원칙 학습 대상이 아니라 부록 성격이라</text>
    <text class="c-soft" x="36" y="318" font-size="11">스터디 범위에서 제외됐어요</text>
    <text class="mono c-soft" x="36" y="352" font-size="9" letter-spacing="0.14em">1 CHAPTER · NOT COVERED</text>
  </g>

  <!-- Legend -->
  <line class="s-rule" x1="0" y1="432" x2="1088" y2="432" stroke-width="0.8"/>
  <text class="mono c-muted" x="0" y="448" font-size="9" letter-spacing="0.14em">LEGEND</text>

  <rect class="fill-accent-tint s-accent" x="100" y="440" width="14" height="10" rx="2" stroke-width="1"/>
  <text class="c-muted" x="120" y="449" font-size="10">다룬 장 (20)</text>

  <rect x="228" y="440" width="14" height="10" rx="2" fill="none" class="s-rule-solid" stroke-width="1" stroke-dasharray="3,3"/>
  <text class="c-muted" x="248" y="449" font-size="10">미커버 (15)</text>

  <text class="mono c-soft" x="1088" y="449" font-size="9" text-anchor="end" letter-spacing="0.14em">COVERAGE 20/35 · 57%</text>
</svg>
